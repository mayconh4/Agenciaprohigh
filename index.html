  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

<div class="shell" id="shell">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar glass" id="sidebar">
    <div class="brand">
      <span class="brand-mark"><svg><use href="#i-spark"/></svg></span>
      <span class="brand-name" id="brandName">NEXUS<small id="brandTag">Agency OS</small></span>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="nav-foot">
      <button class="agency-chip" id="agencyChip" data-action="openSettings">
        <span class="ac-dot"></span>
        <span class="ac-text" id="agencyChipText">Carregando…</span>
        <svg class="ac-gear"><use href="#i-gear"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar glass-thin">
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="tb-title">
        <h1 id="pageTitle">Painel</h1>
        <p id="pageSub">Carregando…</p>
      </div>
      <div class="tb-right">
        <span class="ai-pill" id="aiPill" title="Status da IA">
          <span class="ai-dot"></span><span id="aiPillText">Modo demo</span>
        </span>
        <div id="pageActions" class="page-actions"></div>
      </div>
    </header>
    <main class="view" id="view"></main>
  </div>
</div>

<!-- ============ COPILOTO (drawer) ============ -->
<button class="copilot-fab" id="copilotFab" data-action="toggleCopilot" title="Copiloto IA">
  <svg><use href="#i-bot"/></svg>
</button>
<div class="copilot" id="copilot" aria-hidden="true">
  <div class="copilot-head">
    <div class="ch-id"><svg><use href="#i-bot"/></svg><div><strong>Copiloto NEXUS</strong><span id="copilotMode">modo demo</span></div></div>
    <button class="icon-btn" data-action="toggleCopilot" aria-label="Fechar"><svg><use href="#i-x"/></svg></button>
  </div>
  <div class="copilot-body" id="copilotBody"></div>
  <form class="copilot-input" id="copilotForm">
    <input id="copilotText" type="text" placeholder="Pergunte ao copiloto… (ex: onde estou perdendo dinheiro?)" autocomplete="off" />
    <button type="submit" class="icon-btn primary" aria-label="Enviar"><svg><use href="#i-send"/></svg></button>
  </form>
</div>

<!-- ============ MODAL ============ -->
<div class="overlay" id="overlay" aria-hidden="true">
  <div class="modal glass" id="modal" role="dialog" aria-modal="true">
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast" aria-live="polite"></div>

<!-- Dados gerados (enriquecidos pelo workflow; o core tem defaults embutidos) -->
<script src="js/data/content.js?v=1"></script>
<script src="js/data/niches.js?v=1"></script>
<script src="js/data/prompts.js?v=1"></script>
<script src="js/data/seed.js?v=1"></script>

<!-- Núcleo + IA -->
<script src="js/core.js?v=1"></script>
<script src="js/ai.js?v=1"></script>

<!-- Módulos -->
<script src="js/modules/dashboard.js?v=1"></script>
<script src="js/modules/studio.js?v=1"></script>
<script src="js/modules/prospecting.js?v=1"></script>
<script src="js/modules/pipeline.js?v=1"></script>
<script src="js/modules/clients.js?v=1"></script>
<script src="js/modules/team.js?v=1"></script>
<script src="js/modules/playbook.js?v=1"></script>
<script src="js/modules/copilot.js?v=1"></script>

<script>NEXUS.boot();</script>
</body>
</html>
